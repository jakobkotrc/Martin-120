<html>
   
    <h1>Contact Page</h1>
    <head>
          <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./styles/bootstrap-4.3.1/css/bootstrap.min.css">
<script src="./styles/bootstrap-4.3.1/js/jquery-3.4.1.min.js"></script>
<script src="./styles/bootstrap-4.3.1/js/bootstrap.min.js"></script>
        <link rel="stylesheet" type="text/css" href="css/mainstyle.css"> 

        
      
      <script>
function checkboxes(event)
{
    event.preventDefault(); // stops the page from refreshing

    let valid = true;

    var firstName = document.getElementById("firstname");
    if(firstName.value == "")
    {
        firstName.style.backgroundColor = "red";
        document.getElementById("firstnameMessage").innerHTML = " *Required";
        valid = false;
    }

    var lastName = document.getElementById("lastname");
    if(lastName.value == "")
    {
        lastName.style.backgroundColor = "red";
        document.getElementById("lastnameMessage").innerHTML = " *Required";
        valid = false;
    }

    var email = document.getElementById("email");
    if(email.value == "")
    {
        email.style.backgroundColor = "red";
        document.getElementById("emailMessage").innerHTML = " *Required";
        valid = false;
    }

    var checkbox = document.getElementsByName("I agree");

    if(!checkbox[0].checked)
    {
        alert("You must agree to the terms and conditions to submit your info.");
        valid = false;
    }

    if(valid)
    {
        alert("Form submitted successfully!");
    }
}
    </script>
    </head>
   <body>

    <a href="page2.html">Takes you to the short story.</a>
    <a href="homepage.html">Takes you to the homepage.</a>
    <p> </p>
    <title>Contact Page</title>
<p></p>
<form action="" onsubmit="checkboxes(event);">
    <p>First Name: <input type="text" id="firstname"><span id="firstnameMessage"></span></p>
    <p>Last Name: <input type="text" id="lastname"><span id="lastnameMessage"></span></p>
    <p>Email: <input type="text" id="email"><span id="emailMessage"></span></p>
        <input type="checkbox" name="I agree" value="agree">I agree to the terms and conditions.<br>
  <button id="btnSubmit" class="btn btn-primary" type="submit">
Submit My Info
</button>
</form>
    </body>
